name: Deploy GH-Pages
run-name: Deploy GH-Pages
on:
  workflow_call:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: true
jobs:
  release-page:
    runs-on: ubuntu-latest
    environment:
      name: release
    steps:
      - name: Checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ssh-strict: true
          ssh-user: git
          clean: true
          show-progress: false
          persist-credentials: true
      - name: Git fetch
        run: |
          git fetch && git pull origin main
      - name: Setup Github Pages v6
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build with Jekyll Securely
        uses: ./.github/actions/action.yaml@b429e2b2f7cf4e391d49748b68f1d928639f8795 #v0.0.175
        with:
          destination: './_site\ \$(echo --config \<\(echo -en "title: Cayman theme\ndescription: Cayman is a clean, responsive theme for 0mniteck Pages.\nshow_downloads: true\ngoogle_analytics:\ntheme: jekyll-theme-cayman\n"\) '
          token: ${{github.token}}
      - name: Upload Pages Artifact v5
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
  push-page:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: ${{ steps.deployment.outputs.page_url }}
    needs: release-page
    steps:
      - name: Deploy to GitHub Pages v5
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          path: ./_site
