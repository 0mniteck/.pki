name: Sync Fork
run-name: Sync Fork
description: 'This workflow uses the GitHub CLI to keep one branch on a forked repo in sync with the upstream repo'
on:
  workflow_call:
jobs:
  sync:
    if: ${{github.ref != 'refs/heads/main'}}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: gh repo sync $REPOSITORY -b $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{github.token}}
          REPOSITORY: ${{github.repository}}
          BRANCH_NAME: ${{github.ref_name}}
