name: Release
run-name: Release
description: GitHub Action to manage the immutable/attestable release cycle of 0mniteck/.pki
on:
  repository_dispatch:
    types:
      - Global_Fetch
  workflow_dispatch:   
  schedule:
    - cron: '0 0/6 * * *'
  push:
    paths:
      - 'registry/**'
      - 'index.**'
concurrency:
  group: release-main
  cancel-in-progress: true
permissions:
  id-token: write
  contents: write
  attestations: write
  artifact-metadata: write
jobs:
  fetch-pki:
    name: Fetch PKI
    concurrency:
      group: release
    uses: 0mniteck/.pki/.github/workflows/fetch.yml@0ac0f15faffc3fbb5a52ad8cc9cf4f1d73168b0f # v0.0.175
  release-pki:
    name: Release PKI
    concurrency:
      group: release
    needs: fetch-pki
    uses: 0mniteck/.pki/.github/workflows/immutable.yml@952186567bd272f8e8f6b1ae516916a5499907a3 # v0.0.177
  attested-rel:
    name: Attest PKI
    runs-on: ubuntu-latest
    environment:
      name: release
    needs: release-pki
    permissions:
      id-token: write
      contents: read
      attestations: read
    concurrency:
      group: release
    steps:
      - name: Checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run gh attestation verify
        env:
          GH_TOKEN: ${{github.token}}
        run: |
          for I in ${{github.workspace}}/.github/*/* ${{github.workspace}}/registry/* ${{github.workspace}}/index.* ${{github.workspace}}/local.sh ; do
            gh attestation verify $I --repo 0mniteck/.pki --source-ref refs/heads/main \
            --signer-workflow 0mniteck/.pki/.github/workflows/immutable.yml --digest-alg sha512 || exit 1;
            echo "$I Attested"; done; echo DONE;
  read-me:
    name: Publish Readme
    uses: 0mniteck/.pki/.github/workflows/read-me.yml@c74b68c8e463e7881e6d10660fdc5092a62582d6 # v0.0.175
    concurrency:
      group: release
    needs:
      - attested-rel
      - release-pki
    permissions:
      id-token: write
      contents: write
    with:
      attested_url: "${{needs.release-pki.outputs.URL}}"
  gh-pages:
    name: Release Github Pages
    uses: 0mniteck/.pki/.github/workflows/gh-pages.yml@193aa0a41fc57924b299dda4f2dd55fa3eb95a11 # v0.0.175
    concurrency:
      group: release
    needs: read-me
    permissions:
      contents: read
      pages: write
      id-token: write
